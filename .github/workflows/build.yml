name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE (no UPX, with version metadata)
        run: |
          pyinstaller --onefile --noupx --name nxlookup --version-file version_info.txt nxlookup.py

      - name: Create ZIP archive (alternative — fewer AV false positives)
        run: |
          Compress-Archive -Path dist/nxlookup.exe -DestinationPath dist/nxlookup.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nxlookup-windows
          path: |
            dist/nxlookup.exe
            dist/nxlookup.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nxlookup-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nxlookup.exe
            nxlookup.zip
          generate_release_notes: true
