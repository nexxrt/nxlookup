# whois-normal.conf — core zones (~90 TLDs)
# Lighter alternative to whois.conf (250+ zones).
# Copy to /etc/whois.conf if you prefer fewer zones.
#
# NOTE: nxlookup.exe uses direct socket whois — no config needed.
# This file is for Linux/macOS users of the system 'whois' command.

# Russia / Cyrillic
\.ru$            whois.tcinet.ru
\.xn--p1ai$      whois.tcinet.ru
\.su$            whois.tcinet.ru

